<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/scottsimon1180/IOS-Color-Picker/refs/heads/main/Picker-ALT.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Color Picker</title>
    
    <style>
        :root {
            /* Light Mode Palette */
            --app-bg: #ffffff;
            --primary: #007AFF;
            --primary-active: #0056b3;
            --card: #ffffff;
            --text: #1c1c1e;
            --box-default: #f2f2f7;
            --box-active: #fcfcfd;
            --content-default: #85858b;
            --content-active: #e5e5e7;
            --placeholder: #8e8e93;
            --border-subtle: rgba(0,0,0,0.08);
            --shadow-subtle: rgba(0,0,0,0.06);
        }

        /* Dark Mode Media Query integration */
        @media (prefers-color-scheme: dark) {
            :root {
                --app-bg: #000000;
                --card: #1c1c1e;
                --text: #f2f2f7;
                --box-default: #1c1c1e;
                --box-active: #2c2c2e;
                --content-default: #8e8e93;
                --content-active: #d1d1d6;
                --border-subtle: rgba(255,255,255,0.1);
                --shadow-subtle: rgba(0,0,0,0.4);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top, 40px) 20px env(safe-area-inset-bottom, 30px) 20px;
            box-sizing: border-box;
            height: 100dvh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            gap: 15px; 
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            text-align: center;
            flex-shrink: 0; 
            padding-top: 10px;
            font-weight: 600;
        }

        .canvas-container {
            flex: 1; 
            min-height: 0; 
            width: 100%;
            background-color: var(--box-default);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none; 
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        .placeholder-content {
            position: absolute;
            inset: 0;
            background-color: var(--box-default);
            color: var(--content-default);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.1s ease-out, color 0.1s ease-out;
            -webkit-tap-highlight-color: transparent;
        }

        .placeholder-content.pressed {
            background-color: var(--box-active);
            color: var(--content-active);
        }

        .placeholder-content svg {
            width: 46px;
            height: 46px;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }

        .placeholder-content.pressed svg { transform: scale(0.96); }
        .placeholder-text { font-weight: 500; font-size: 1.05rem; pointer-events: none; }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            opacity: 0; 
            transition: opacity 0.3s ease;
        }
        
        canvas.loaded { opacity: 1; }

        #result-card {
            background-color: var(--card);
            width: 100%;
            padding: 15px 20px;
            border-radius: 16px;
            height: 90px; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            color: var(--placeholder); 
            transition: color 0.2s, box-shadow 0.2s, transform 0.1s;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
        }

        #result-card.active {
            color: var(--text);
            box-shadow: 0 4px 15px var(--shadow-subtle);
        }

        #result-card.active:active { transform: scale(0.98); }

        .color-info { display: flex; flex-direction: column; gap: 4px; }
        .color-row { display: flex; align-items: baseline; gap: 8px;}
        .color-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; width: 30px;}
        .color-value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; font-size: 1.05rem; font-weight: 700; }
        
        #color-swatch {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--border-subtle);
            background-color: transparent; 
            transition: background-color 0.1s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            flex-shrink: 0;
        }

        .btn {
            border: none;
            color: white;
            background-color: var(--primary);
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:active { background-color: var(--primary-active); }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }

        /* --- PARAMETRIC CROSSHAIR ARCHITECTURE --- */
        #crosshair {
            --circle-size: 45px;
            --circle-stroke: 6px; 
            --cross-size: 5px;
            --cross-stroke: 1px;
            --cross-color: #ffffff; 
            
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: var(--circle-size);
            height: var(--circle-size);
            pointer-events: none;
            z-index: 100;
            will-change: transform;
        }

        #crosshair.invert-dark {
            --cross-color: #1c1c1e; 
        }

        .crosshair-ring {
            position: absolute;
            inset: 0; 
            border-radius: 50%;
            background: conic-gradient(#ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-mask: radial-gradient(circle closest-side, transparent calc(100% - var(--circle-stroke) - 0.5px), black calc(100% - var(--circle-stroke) + 0.5px));
            mask: radial-gradient(circle closest-side, transparent calc(100% - var(--circle-stroke) - 0.5px), black calc(100% - var(--circle-stroke) + 0.5px));
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            background-color: var(--cross-color);
            transform: translate(-50%, -50%);
            transition: background-color 0.15s ease-out;
            box-shadow: 0 0 2px rgba(0,0,0,0.3); 
        }

        #crosshair::before { width: var(--cross-size); height: var(--cross-stroke); }
        #crosshair::after { width: var(--cross-stroke); height: var(--cross-size); }

    </style>
</head>
<body>

    <h1>Color Picker</h1>

    <div class="canvas-container">
        <div class="placeholder-content" id="placeholderContent">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="-1.0 -1.0 27.42 22.87">
                <g fill="currentColor" stroke="none">
                    <path d="M19.771 2.50845L20.2599 5.2897L18.8541 5.2897L18.4194 2.82095C18.2241 1.71938 17.521 1.25845 16.4663 1.44595L2.81005 3.84438C1.73974 4.04751 1.25536 4.71157 1.45067 5.82095L3.08349 15.0866C3.2788 16.1881 3.9663 16.6569 5.03661 16.4694L5.41942 16.4019L5.41942 17.8077L5.25536 17.8366C3.25536 18.1881 2.07567 17.3678 1.73192 15.3991L0.0756744 5.98501C-0.268076 4.01626 0.560049 2.84438 2.54442 2.49282L16.2475 0.0787596C18.2397-0.272803 19.4272 0.555322 19.771 2.50845Z" />
                    <path d="M12.5757 12.9616C13.7554 12.9616 14.7163 11.985 14.7163 10.7975C14.7163 9.63345 13.7554 8.64907 12.5757 8.64907C11.3882 8.64907 10.435 9.63345 10.435 10.7975C10.435 11.985 11.3882 12.9616 12.5757 12.9616ZM8.47411 20.3834L22.1929 20.3834C23.8882 20.3834 24.771 19.5241 24.771 17.8288L24.771 17.1256L20.1304 12.7663C19.7241 12.3913 19.2397 12.1959 18.7319 12.1959C18.2163 12.1959 17.7788 12.3756 17.3491 12.7584L13.2554 16.3522L11.6538 14.8913C11.2632 14.5397 10.8647 14.3678 10.4194 14.3678C10.0054 14.3678 9.63817 14.5397 9.24755 14.8834L5.88817 17.8366C5.88817 19.5241 6.7788 20.3834 8.47411 20.3834ZM8.45849 20.8678L22.3725 20.8678C24.3882 20.8678 25.4194 19.8444 25.4194 17.86L25.4194 8.29751C25.4194 6.31313 24.3882 5.2897 22.3725 5.2897L8.45849 5.2897C6.43505 5.2897 5.41942 6.30532 5.41942 8.29751L5.41942 17.86C5.41942 19.86 6.43505 20.8678 8.45849 20.8678ZM8.48192 19.485C7.39599 19.485 6.80224 18.9069 6.80224 17.7897L6.80224 8.37563C6.80224 7.25063 7.39599 6.67251 8.48192 6.67251L22.3491 6.67251C23.4194 6.67251 24.0288 7.25063 24.0288 8.37563L24.0288 17.7897C24.0288 18.9069 23.4194 19.485 22.3491 19.485Z" />
                </g>
            </svg>
            <span class="placeholder-text">Tap to select photo</span>
        </div>
        <canvas id="imageCanvas"></canvas>
    </div>

    <div id="result-card" onclick="copyToClipboard()">
        <div class="color-info">
            <div class="color-row">
                <span class="color-label">HEX</span>
                <span class="color-value" id="hexValue">#------</span>
            </div>
            <div class="color-row">
                <span class="color-label">RGB</span>
                <span class="color-value" id="rgbValue">---, ---, ---</span>
            </div>
        </div>
        <div id="color-swatch"></div>
    </div>

    <div class="upload-btn-wrapper">
        <button class="btn" id="btnText">Select Photo</button>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div id="crosshair">
        <div class="crosshair-ring"></div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const mainCanvas = document.getElementById('imageCanvas');
        const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
        
        const crosshair = document.getElementById('crosshair');
        
        const resultCard = document.getElementById('result-card');
        const hexDisplay = document.getElementById('hexValue');
        const rgbDisplay = document.getElementById('rgbValue');
        const swatch = document.getElementById('color-swatch');
        const placeholderContent = document.getElementById('placeholderContent');
        const btnText = document.getElementById('btnText');

        const MAX_IMG_DIMENSION = 1600; 
        const TOUCH_OFFSET_Y = -60; 

        let cachedImageData = null;
        let currentHex = "";
        let animationFrameId = null;
        let isDragging = false;
        
        // Cache variables to prevent layout thrashing and unnecessary DOM updates
        let canvasMetrics = null;
        let lastR = null, lastG = null, lastB = null;

        function handlePlaceholderTouchStart() { placeholderContent.classList.add('pressed'); }
        function handlePlaceholderTouchEnd() { placeholderContent.classList.remove('pressed'); }

        placeholderContent.addEventListener('touchstart', handlePlaceholderTouchStart, {passive: true});
        placeholderContent.addEventListener('mousedown', handlePlaceholderTouchStart);
        ['touchend', 'mouseup', 'mouseleave', 'touchcancel'].forEach(evt => {
            placeholderContent.addEventListener(evt, handlePlaceholderTouchEnd);
        });

        placeholderContent.addEventListener('click', () => imageLoader.click());
        
        // Fix to allow selecting the identical file multiple times sequentially
        imageLoader.addEventListener('click', function() { this.value = null; });
        imageLoader.addEventListener('change', handleImage, false);

        // Pre-compute canvas boundary mathematics to save compute load during touch events
        function updateCanvasMetrics() {
            if (mainCanvas.width === 0) return;
            const rect = mainCanvas.getBoundingClientRect();
            const scale = Math.min(rect.width / mainCanvas.width, rect.height / mainCanvas.height);
            
            const renderedWidth = mainCanvas.width * scale;
            const renderedHeight = mainCanvas.height * scale;
            
            canvasMetrics = {
                left: rect.left,
                top: rect.top,
                scale: scale,
                offsetX: (rect.width - renderedWidth) / 2,
                offsetY: (rect.height - renderedHeight) / 2
            };
        }

        window.addEventListener('resize', updateCanvasMetrics);

        function handleImage(e) {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    placeholderContent.style.display = 'none';
                    crosshair.style.display = 'none'; 
                    
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_IMG_DIMENSION || height > MAX_IMG_DIMENSION) {
                        const ratio = Math.min(MAX_IMG_DIMENSION / width, MAX_IMG_DIMENSION / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);
                    }

                    mainCanvas.width = width;
                    mainCanvas.height = height;
                    mainCtx.clearRect(0, 0, width, height); 
                    mainCtx.drawImage(img, 0, 0, width, height);
                    
                    cachedImageData = mainCtx.getImageData(0, 0, width, height).data;
                    updateCanvasMetrics(); // Initialize metrics
                    
                    // Reset diffing state for the new image
                    lastR = null; lastG = null; lastB = null;

                    mainCanvas.classList.add('loaded');
                    btnText.textContent = "Select New Photo";
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function handleInteraction(e) {
            if (!cachedImageData || !canvasMetrics) return;

            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            const targetX = clientX;
            const targetY = clientY + TOUCH_OFFSET_Y;

            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(() => {
                    processCoordinates(targetX, targetY);
                    animationFrameId = null;
                });
            }
        }

        function processCoordinates(targetX, targetY) {
            // Establish visual boundaries based on cached spatial metrics
            const minX = canvasMetrics.left + canvasMetrics.offsetX;
            const maxX = minX + (mainCanvas.width * canvasMetrics.scale);
            const minY = canvasMetrics.top + canvasMetrics.offsetY;
            const maxY = minY + (mainCanvas.height * canvasMetrics.scale);

            // Clamp coordinates so the reticle binds strictly to the edges without faulting
            const clampedX = Math.max(minX, Math.min(targetX, maxX - 1));
            const clampedY = Math.max(minY, Math.min(targetY, maxY - 1));

            const x = Math.floor((clampedX - minX) / canvasMetrics.scale);
            const y = Math.floor((clampedY - minY) / canvasMetrics.scale);

            // Safety break (clamping generally nullifies the need for this, but kept for absolute safety)
            if (x < 0 || y < 0 || x >= mainCanvas.width || y >= mainCanvas.height) return;

            // Direct transform injection using specific offset (23px represents half of --circle-size)
            crosshair.style.display = 'block';
            crosshair.style.transform = `translate3d(${clampedX - 23}px, ${clampedY - 23}px, 0)`;

            const index = (y * mainCanvas.width + x) * 4;
            const r = cachedImageData[index];
            const g = cachedImageData[index + 1];
            const b = cachedImageData[index + 2];
            
            updateDisplay(r, g, b);
        }

        function updateDisplay(r, g, b) {
            // DOM manipulation diffing: exit early if the color vector remains identical
            if (r === lastR && g === lastG && b === lastB) return;
            lastR = r; lastG = g; lastB = b;

            currentHex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            
            hexDisplay.textContent = currentHex;
            rgbDisplay.textContent = `${r}, ${g}, ${b}`;
            swatch.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

            const luminance = (0.2126 * r) + (0.7152 * g) + (0.0722 * b);
            
            if (luminance >= 128) {
                crosshair.classList.add('invert-dark');
            } else {
                crosshair.classList.remove('invert-dark');
            }
            
            resultCard.classList.add('active');
        }

        function copyToClipboard() {
            if (currentHex) {
                navigator.clipboard.writeText(currentHex).catch(err => console.error('Data pipeline exception:', err));
                
                const originalText = hexDisplay.textContent;
                hexDisplay.textContent = "COPIED!";
                setTimeout(() => { hexDisplay.textContent = originalText; }, 800);
            }
        }

        mainCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = true; handleInteraction(e); }, { passive: false });
        mainCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(isDragging) handleInteraction(e); }, { passive: false });
        mainCanvas.addEventListener('touchend', () => { isDragging = false; }); 

        mainCanvas.addEventListener('mousedown', (e) => { isDragging = true; handleInteraction(e); });
        mainCanvas.addEventListener('mousemove', (e) => { if(isDragging) handleInteraction(e); });
        mainCanvas.addEventListener('mouseup', () => { isDragging = false; });
        mainCanvas.addEventListener('mouseleave', () => { isDragging = false; });

    </script>
</body>
</html>
